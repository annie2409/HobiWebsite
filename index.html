<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HOBI — Technology & Content That Help You Live Better</title>
  <meta name="description" content="HOBI builds technology and content that help people live better — wherever life takes them." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: 'DM Sans', sans-serif; color: #0F172A; background: #fff; -webkit-font-smoothing: antialiased; }
    h1,h2,h3,h4,h5 { font-family: 'Sora', sans-serif; }
    a { text-decoration: none; color: inherit; }
    input, textarea { font-family: 'DM Sans', sans-serif; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #F2F4F7; }
    ::-webkit-scrollbar-thumb { background: #1E6FD9; border-radius: 99px; }
    .reveal { opacity: 0; transform: translateY(28px); transition: opacity 0.65s ease, transform 0.65s ease; }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    @media (max-width: 768px) {
      .nav-desktop { display: none !important; }
      .nav-hamburger { display: flex !important; }
      .hero-grid { grid-template-columns: 1fr !important; }
      .hero-visual { display: none !important; }
      .two-col { grid-template-columns: 1fr !important; }
      .contact-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const C = {
      blue: "#1E6FD9", blueDark: "#1455A8", blueLight: "#E8F1FB",
      green: "#27A86E", greenDark: "#1D8558", greenLight: "#E6F7F1",
      white: "#FFFFFF", offWhite: "#F8FAFB", gray50: "#F2F4F7",
      gray200: "#E2E8F0", gray400: "#94A3B8", gray600: "#4A5568", gray900: "#0F172A",
    };

    const SOCIALS = [
      { label: "YouTube",   icon: "▶", url: "https://www.youtube.com/@AnnieCannotCode",          color: "#CC0000" },
      { label: "TikTok",    icon: "♪", url: "https://www.tiktok.com/@heyyoufoundme2409",          color: "#333"    },
      { label: "Instagram", icon: "📸", url: "https://www.instagram.com/callmeannie2409",         color: "#C13584" },
    ];

    // ── Scroll reveal ──
    function useReveal() {
      useEffect(() => {
        const run = () => {
          document.querySelectorAll(".reveal").forEach(el => {
            const rect = el.getBoundingClientRect();
            if (rect.top < window.innerHeight - 60) el.classList.add("visible");
          });
        };
        run();
        window.addEventListener("scroll", run);
        return () => window.removeEventListener("scroll", run);
      });
    }

    // ── Logo ──
    function HobiLogo({ size = 40, white: isWhite = false }) {
      const id = "g" + size + (isWhite ? "w" : "");
      return (
        <svg width={size} height={size} viewBox="0 0 40 40" fill="none">
          <defs>
            <linearGradient id={id} x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
              <stop offset="0%" stopColor={isWhite ? "rgba(255,255,255,0.3)" : C.blue} />
              <stop offset="100%" stopColor={isWhite ? "rgba(255,255,255,0.1)" : C.green} />
            </linearGradient>
          </defs>
          <rect width="40" height="40" rx="10" fill={`url(#${id})`} />
          <text x="50%" y="56%" dominantBaseline="middle" textAnchor="middle"
            fontFamily="Sora,sans-serif" fontWeight="800" fontSize="17" fill="white">H</text>
        </svg>
      );
    }

    // ── Button ──
    function Btn({ children, variant = "primary", onClick, style: extra = {} }) {
      const [hov, setHov] = useState(false);
      const base = {
        border: "none", cursor: "pointer", borderRadius: "99px",
        fontFamily: "Sora", fontWeight: 600, fontSize: "14px",
        padding: "13px 28px", transition: "all 0.2s", display: "inline-flex",
        alignItems: "center", gap: "8px", letterSpacing: "0.2px",
        transform: hov ? "translateY(-2px)" : "translateY(0)",
      };
      const variants = {
        primary: { background: `linear-gradient(135deg, ${C.blue}, ${C.green})`, color: C.white, boxShadow: `0 4px 20px rgba(30,111,217,0.3)` },
        outline:  { background: "transparent", color: C.blue, border: `2px solid ${C.blue}` },
        ghost:    { background: C.blueLight, color: C.blue },
        green:    { background: `linear-gradient(135deg, ${C.green}, ${C.blue})`, color: C.white, boxShadow: `0 4px 20px rgba(39,168,110,0.3)` },
        white:    { background: "rgba(255,255,255,0.15)", color: C.white, border: "2px solid rgba(255,255,255,0.5)" },
      };
      return (
        <button style={{ ...base, ...variants[variant], ...extra }} onClick={onClick}
          onMouseEnter={() => setHov(true)} onMouseLeave={() => setHov(false)}>
          {children}
        </button>
      );
    }

    // ── Card ──
    function Card({ children, style: extra = {}, hover = true }) {
      const [hov, setHov] = useState(false);
      return (
        <div onMouseEnter={() => hover && setHov(true)} onMouseLeave={() => hover && setHov(false)}
          style={{
            background: C.white, borderRadius: "20px", padding: "32px",
            border: `1px solid ${hov ? C.blue + "40" : C.gray200}`,
            boxShadow: hov ? "0 12px 40px rgba(30,111,217,0.12)" : "0 2px 12px rgba(0,0,0,0.05)",
            transition: "all 0.3s ease",
            transform: hov ? "translateY(-4px)" : "translateY(0)", ...extra,
          }}>{children}</div>
      );
    }

    // ── Section ──
    function Section({ children, bg = C.white, style: extra = {} }) {
      return (
        <section style={{ background: bg, padding: "100px 40px", ...extra }}>
          <div style={{ maxWidth: "1100px", margin: "0 auto" }}>{children}</div>
        </section>
      );
    }

    // ── Section Header ──
    function SectionHeader({ label, title, subtitle }) {
      return (
        <div className="reveal" style={{ textAlign: "center", marginBottom: "64px" }}>
          {label && <span style={{ display: "inline-block", background: C.blueLight, color: C.blue, padding: "6px 16px", borderRadius: "99px", fontSize: "12px", fontFamily: "Sora", fontWeight: 600, letterSpacing: "1px", textTransform: "uppercase", marginBottom: "16px" }}>{label}</span>}
          <h2 style={{ fontSize: "clamp(28px,4vw,42px)", fontWeight: 700, color: C.gray900, lineHeight: 1.2, marginBottom: "16px" }}>{title}</h2>
          {subtitle && <p style={{ color: C.gray600, fontSize: "17px", maxWidth: "600px", margin: "0 auto", lineHeight: 1.7 }}>{subtitle}</p>}
        </div>
      );
    }

    // ══════════════════════════════════════════════
    // NAVBAR
    // ══════════════════════════════════════════════
    function Navbar({ page, setPage }) {
      const [scrolled, setScrolled] = useState(false);
      const [menuOpen, setMenuOpen] = useState(false);
      useEffect(() => {
        const fn = () => setScrolled(window.scrollY > 20);
        window.addEventListener("scroll", fn);
        return () => window.removeEventListener("scroll", fn);
      }, []);
      const links = ["Home","About","Products","Media","Future Plans","Contact"];
      const nav = (l) => { setPage(l); window.scrollTo(0,0); setMenuOpen(false); };
      return (
        <nav style={{
          position:"fixed", top:0, left:0, right:0, zIndex:1000,
          display:"flex", alignItems:"center", justifyContent:"space-between",
          padding:"0 40px", height:"68px",
          background: scrolled ? "rgba(255,255,255,0.97)" : "rgba(255,255,255,0.88)",
          backdropFilter:"blur(12px)",
          borderBottom: scrolled ? `1px solid ${C.gray200}` : "1px solid transparent",
          transition:"all 0.3s ease",
        }}>
          <button onClick={() => nav("Home")} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:"10px" }}>
            <HobiLogo size={36} />
            <span style={{ fontFamily:"Sora", fontWeight:700, fontSize:"20px", color:C.blue, letterSpacing:"-0.5px" }}>HOBI</span>
          </button>

          <div className="nav-desktop" style={{ display:"flex", gap:"4px", alignItems:"center" }}>
            {links.map(l => (
              <button key={l} onClick={() => nav(l)} style={{
                background: page===l ? C.blueLight : "none", border:"none", cursor:"pointer",
                padding:"8px 16px", borderRadius:"99px", fontFamily:"DM Sans",
                fontWeight: page===l ? 600 : 400, fontSize:"14px",
                color: page===l ? C.blue : C.gray600, transition:"all 0.2s",
              }}>{l}</button>
            ))}
            <button onClick={() => nav("Contact")} style={{
              marginLeft:"8px", background:`linear-gradient(135deg,${C.blue},${C.green})`,
              color:C.white, border:"none", cursor:"pointer", padding:"10px 20px",
              borderRadius:"99px", fontFamily:"Sora", fontWeight:600, fontSize:"13px",
              letterSpacing:"0.3px",
            }}>Get Started</button>
          </div>

          <button className="nav-hamburger" onClick={() => setMenuOpen(!menuOpen)}
            style={{ display:"none", flexDirection:"column", gap:"5px", background:"none", border:"none", cursor:"pointer", padding:"8px" }}>
            <div style={{ width:22, height:2, background:C.gray900, borderRadius:2 }} />
            <div style={{ width:22, height:2, background:C.gray900, borderRadius:2 }} />
            <div style={{ width:16, height:2, background:C.gray900, borderRadius:2 }} />
          </button>

          {menuOpen && (
            <div style={{ position:"absolute", top:"68px", left:0, right:0, background:C.white, borderBottom:`1px solid ${C.gray200}`, padding:"16px 24px", display:"flex", flexDirection:"column", gap:"4px" }}>
              {links.map(l => (
                <button key={l} onClick={() => nav(l)} style={{
                  background: page===l ? C.blueLight : "none", border:"none", cursor:"pointer",
                  padding:"12px 16px", borderRadius:"12px", fontFamily:"DM Sans",
                  fontWeight: page===l ? 600 : 400, fontSize:"15px",
                  color: page===l ? C.blue : C.gray600, textAlign:"left",
                }}>{l}</button>
              ))}
            </div>
          )}
        </nav>
      );
    }

    // ══════════════════════════════════════════════
    // FOOTER
    // ══════════════════════════════════════════════
    function Footer({ setPage }) {
      const nav = (l) => { setPage(l); window.scrollTo(0,0); };
      return (
        <footer style={{ background:C.gray900, color:C.white, padding:"60px 40px 32px" }}>
          <div style={{ maxWidth:"1100px", margin:"0 auto" }}>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(200px,1fr))", gap:"40px", marginBottom:"48px" }}>
              <div>
                <div style={{ display:"flex", alignItems:"center", gap:"10px", marginBottom:"16px" }}>
                  <HobiLogo size={32} white />
                  <span style={{ fontFamily:"Sora", fontWeight:700, fontSize:"18px" }}>HOBI</span>
                </div>
                <p style={{ color:C.gray400, fontSize:"14px", lineHeight:1.7, maxWidth:"220px" }}>Technology and content that help you live better.</p>
                <div style={{ marginTop:"16px" }}>
                  <p style={{ color:C.gray400, fontSize:"13px", marginBottom:"4px" }}>📞 +61 0451 837 728</p>
                  <p style={{ color:C.gray400, fontSize:"13px" }}>📧 hello@hobi.com.au</p>
                </div>
              </div>
              {[
                { title:"Company", links:["Home","About","Products","Media"] },
                { title:"Explore",  links:["Future Plans","Contact"] },
              ].map(col => (
                <div key={col.title}>
                  <p style={{ fontFamily:"Sora", fontWeight:600, fontSize:"13px", color:C.gray400, letterSpacing:"1px", textTransform:"uppercase", marginBottom:"16px" }}>{col.title}</p>
                  {col.links.map(l => (
                    <button key={l} onClick={() => nav(l)} style={{ display:"block", background:"none", border:"none", color:C.white, fontSize:"14px", cursor:"pointer", marginBottom:"10px", fontFamily:"DM Sans", opacity:0.85, textAlign:"left" }}>{l}</button>
                  ))}
                </div>
              ))}
              <div>
                <p style={{ fontFamily:"Sora", fontWeight:600, fontSize:"13px", color:C.gray400, letterSpacing:"1px", textTransform:"uppercase", marginBottom:"16px" }}>Follow Us</p>
                <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
                  {SOCIALS.map(s => (
                    <a key={s.label} href={s.url} target="_blank" rel="noopener noreferrer"
                      style={{ display:"inline-flex", alignItems:"center", gap:"8px", background:"rgba(255,255,255,0.08)", padding:"8px 14px", borderRadius:"10px", fontSize:"13px", color:C.white, fontFamily:"Sora", fontWeight:500 }}>
                      <span>{s.icon}</span>{s.label}
                    </a>
                  ))}
                </div>
              </div>
            </div>
            <div style={{ borderTop:"1px solid rgba(255,255,255,0.1)", paddingTop:"24px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:"12px" }}>
              <p style={{ color:C.gray400, fontSize:"13px" }}>© 2025 HOBI. All rights reserved.</p>
              <p style={{ color:C.gray400, fontSize:"13px" }}>Technology · Wellness · Media</p>
            </div>
          </div>
        </footer>
      );
    }

    // ══════════════════════════════════════════════
    // HOME PAGE
    // ══════════════════════════════════════════════
    function HomePage({ setPage }) {
      useReveal();
      const nav = (l) => { setPage(l); window.scrollTo(0,0); };
      return (
        <div style={{ paddingTop:"68px" }}>
          {/* Hero */}
          <section style={{
            minHeight:"92vh", display:"flex", alignItems:"center",
            background:`radial-gradient(ellipse 80% 60% at 60% 40%, ${C.blueLight} 0%, ${C.white} 60%), radial-gradient(ellipse 50% 40% at 80% 80%, ${C.greenLight} 0%, transparent 60%)`,
            padding:"80px 40px", position:"relative", overflow:"hidden",
          }}>
            <div style={{ position:"absolute", top:-80, right:-80, width:400, height:400, borderRadius:"50%", background:`radial-gradient(circle, ${C.blue}15, transparent 70%)`, pointerEvents:"none" }} />
            <div style={{ position:"absolute", bottom:-60, left:-60, width:300, height:300, borderRadius:"50%", background:`radial-gradient(circle, ${C.green}15, transparent 70%)`, pointerEvents:"none" }} />
            <div className="hero-grid" style={{ maxWidth:"1100px", margin:"0 auto", display:"grid", gridTemplateColumns:"1fr 1fr", gap:"60px", alignItems:"center", width:"100%" }}>
              <div>
                <div style={{ display:"flex", alignItems:"center", gap:"12px", marginBottom:"28px" }}>
                  <HobiLogo size={52} />
                  <span style={{ fontFamily:"Sora", fontWeight:800, fontSize:"26px", background:`linear-gradient(135deg,${C.blue},${C.green})`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>HOBI</span>
                </div>
                <h1 style={{ fontSize:"clamp(36px,5vw,60px)", fontWeight:800, lineHeight:1.1, color:C.gray900, marginBottom:"20px", letterSpacing:"-1px" }}>
                  Technology &amp; Content<br />
                  <span style={{ background:`linear-gradient(135deg,${C.blue},${C.green})`, WebkitBackgroundClip:"text", WebkitTextFillColor:"transparent" }}>That Help You Live Better</span>
                </h1>
                <p style={{ color:C.gray600, fontSize:"18px", lineHeight:1.7, marginBottom:"36px", maxWidth:"480px" }}>
                  We simplify travel planning, support personal wellness, and promote healthy living through thoughtfully designed tools and engaging content.
                </p>
                <div style={{ display:"flex", gap:"14px", flexWrap:"wrap" }}>
                  <Btn onClick={() => nav("Products")}>Explore Products →</Btn>
                  <Btn variant="outline" onClick={() => nav("Media")}>View Content</Btn>
                  <Btn variant="ghost" onClick={() => nav("Contact")}>Contact Us</Btn>
                </div>
              </div>
              <div className="hero-visual" style={{ display:"flex", justifyContent:"center" }}>
                <div style={{ width:"320px", height:"320px", borderRadius:"40px", background:`linear-gradient(135deg,${C.blue}20,${C.green}20)`, border:`2px solid ${C.blue}20`, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:"16px" }}>
                  <div style={{ fontSize:"72px" }}>🌿</div>
                  <p style={{ fontFamily:"Sora", fontWeight:700, fontSize:"20px", color:C.gray900 }}>Stretch Wellness App</p>
                  <span style={{ background:C.greenLight, color:C.green, padding:"6px 16px", borderRadius:"99px", fontSize:"13px", fontWeight:600 }}>Featured Product</span>
                </div>
              </div>
            </div>
          </section>

          {/* Pillars */}
          <Section bg={C.offWhite}>
            <SectionHeader label="What We Do" title="Three Pillars of Better Living" subtitle="Our work sits at the intersection of technology, wellness, and creativity." />
            <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))", gap:"24px" }}>
              {[
                { icon:"💻", color:"blue", title:"Technology", desc:"We build intuitive apps and digital tools that simplify everyday decisions — from travel planning to daily wellness routines." },
                { icon:"🌱", color:"green", title:"Health & Wellness", desc:"Our products promote physical and mental well-being through personalized routines, guided exercises, and AI-powered recommendations." },
                { icon:"🎬", color:"blue", title:"Media & Storytelling", desc:"We create compelling travel and lifestyle content that inspires people to explore the world and live more intentionally." },
              ].map(p => (
                <div className="reveal" key={p.title}>
                  <Card>
                    <div style={{ width:56, height:56, borderRadius:"16px", background: p.color==="blue" ? C.blueLight : C.greenLight, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"26px", marginBottom:"20px" }}>{p.icon}</div>
                    <h3 style={{ fontFamily:"Sora", fontWeight:700, fontSize:"20px", marginBottom:"12px" }}>{p.title}</h3>
                    <p style={{ color:C.gray600, lineHeight:1.7, fontSize:"15px" }}>{p.desc}</p>
                  </Card>
                </div>
              ))}
            </div>
          </Section>

          {/* Featured Product */}
          <Section>
            <div className="two-col" style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:"60px", alignItems:"center" }}>
              <div className="reveal">
                <span style={{ display:"inline-block", background:C.greenLight, color:C.green, padding:"6px 16px", borderRadius:"99px", fontSize:"12px", fontFamily:"Sora", fontWeight:600, letterSpacing:"1px", textTransform:"uppercase", marginBottom:"20px" }}>Featured Product</span>
                <h2 style={{ fontSize:"clamp(28px,3.5vw,42px)", fontWeight:700, marginBottom:"16px", lineHeight:1.2 }}>Stretch Wellness App</h2>
                <p style={{ color:C.gray600, fontSize:"16px", lineHeight:1.7, marginBottom:"28px" }}>A beautifully designed wellness app that delivers personalized stretch routines, guided animations, and AI-powered scheduling — helping you stay flexible and pain-free.</p>
                <div style={{ display:"flex", flexDirection:"column", gap:"12px", marginBottom:"32px" }}>
                  {["Personalized stretch routines","Guided animations","AI routine generation","Progress tracking"].map(f => (
                    <div key={f} style={{ display:"flex", alignItems:"center", gap:"10px" }}>
                      <div style={{ width:22, height:22, borderRadius:"50%", background:C.greenLight, display:"flex", alignItems:"center", justifyContent:"center", fontSize:"12px", flexShrink:0, color:C.green, fontWeight:700 }}>✓</div>
                      <span style={{ color:C.gray600, fontSize:"15px" }}>{f}</span>
                    </div>
                  ))}
                </div>
                <Btn variant="green" onClick={() => nav("Products")}>Learn More →</Btn>
              </div>
              <div className="reveal" style={{ display:"flex", justifyContent:"center" }}>
                <div style={{ width:"280px", background:C.gray900, borderRadius:"36px", padding:"20px", boxShadow:"0 32px 80px rgba(0,0,0,0.2)" }}>
                  <div style={{ background:`linear-gradient(160deg,${C.green},${C.blue})`, borderRadius:"24px", padding:"24px", marginBottom:"12px", textAlign:"center" }}>
                    <p style={{ fontFamily:"Sora", color:"rgba(255,255,255,0.7)", fontSize:"11px", marginBottom:"8px", letterSpacing:"1px", textTransform:"uppercase" }}>Good morning!</p>
                    <p style={{ fontFamily:"Sora", fontWeight:700, color:C.white, fontSize:"18px" }}>Ready to stretch?</p>
                    <div style={{ fontSize:"44px", margin:"12px 0" }}>🧘</div>
                  </div>
                  {[{name:"Morning Routine",dur:"10 min",cal:"45 kcal",active:true},{name:"Office Stretch",dur:"5 min",cal:"22 kcal",active:false},{name:"Hip Opener",dur:"8 min",cal:"35 kcal",active:false}].map(r => (
                    <div key={r.name} style={{ background: r.active ? `linear-gradient(135deg,${C.green}30,${C.blue}20)` : "rgba(255,255,255,0.05)", border: r.active ? `1px solid ${C.green}50` : "1px solid rgba(255,255,255,0.1)", borderRadius:"14px", padding:"12px 14px", display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px" }}>
                      <p style={{ fontFamily:"Sora", color:C.white, fontSize:"13px", fontWeight: r.active ? 600 : 400 }}>{r.name}</p>
                      <div style={{ textAlign:"right" }}>
                        <p style={{ color: r.active ? C.green : C.gray400, fontSize:"12px" }}>{r.dur}</p>
                        <p style={{ color:C.gray400, fontSize:"11px" }}>{r.cal}</p>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          </Section>

          {/* Media */}
          <Section bg={C.gray900} style={{ padding:"100px 40px" }}>
            <div className="reveal" style={{ textAlign:"center", marginBottom:"64px" }}>
              <span style={{ display:"inline-block", background:"rgba(255,255,255,0.1)", color:C.white, padding:"6px 16px", borderRadius:"99px", fontSize:"12px", fontFamily:"Sora", fontWeight:600, letterSpacing:"1px", textTransform:"uppercase", marginBottom:"16px" }}>Media & Content</span>
              <h2 style={{ fontSize:"clamp(28px,4vw,42px)", fontWeight:700, color:C.white, marginBottom:"16px" }}>Stories That Inspire Better Living</h2>
              <p style={{ color:C.gray400, fontSize:"17px", maxWidth:"600px", margin:"0 auto", lineHeight:1.7 }}>Travel content and lifestyle storytelling for the modern explorer.</p>
            </div>
            <div className="reveal" style={{ display:"grid", gridTemplateColumns:"repeat(auto-fit,minmax(280px,1fr))", gap:"24px", marginBottom:"40px" }}>
              {[
                { emoji:"✈️", title:"Travel Planning Guides", desc:"Smart, actionable guides to help you plan smarter and travel better." },
                { emoji:"🎥", title:"YouTube Content", desc:"Visual storytelling from destinations around the world." },
                { emoji:"🥗", title:"Healthy Eating Tips", desc:"Sustainable eating habits for travelers and homebodies alike." },
              ].map(m => (
                <div key={m.title} style={{ background:"rgba(255,255,255,0.05)", border:"1px solid rgba(255,255,255,0.1)", borderRadius:"20px", padding:"28px" }}>
                  <div style={{ fontSize:"36px", marginBottom:"16px" }}>{m.emoji}</div>
                  <h3 style={{ fontFamily:"Sora", fontWeight:600, color:C.white, fontSize:"17px", marginBottom:"10px" }}>{m.title}</h3>
                  <p style={{ color:C.gray400, fontSize:"14px", lineHeight:1.6 }}>{m.desc}</p>
                </div>
              ))}
            </div>

                        <label style={{ display:"block", fontSize:"13px", fontFamily:"Sora", fontWeight:600, color:C.gray600, marginBottom:"8px" }}>Subject</label>
                        <input style={inp} placeholder="What's this about?" value={form.subject} onChange={e => setForm({...form, subject:e.target.value})} />
                      </div>
                      <div style={{ marginBottom:"24px" }}>
                        <label style={{ display:"block", fontSize:"13px", fontFamily:"Sora", fontWeight:600, color:C.gray600, marginBottom:"8px" }}>Message *</label>
                        <textarea style={{ ...inp, resize:"vertical", minHeight:"140px" }} placeholder="Tell us more..." value={form.message} onChange={e => setForm({...form, message:e.target.value})} />
                      </div>
                      <Btn onClick={() => { if(form.name&&form.email&&form.message) setSent(true); }} style={{ width:"100%", justifyContent:"center" }}>Send Message →</Btn>
                    </>
                  )}
                </Card>
              </div>
            </div>

            <div className="reveal" style={{ marginTop:"60px", background:`linear-gradient(135deg,${C.blue},${C.green})`, borderRadius:"24px", padding:"48px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:"24px" }}>
              <div>
                <h3 style={{ fontFamily:"Sora", fontWeight:700, fontSize:"24px", color:C.white, marginBottom:"8px" }}>Business Enquiries</h3>
                <p style={{ color:"rgba(255,255,255,0.8)", fontSize:"16px" }}>Partnerships, collaborations, and press inquiries welcome.</p>
              </div>
              <Btn variant="white">hello@hobi.com.au</Btn>
            </div>
          </Section>
        </div>
      );
    }

    // ══════════════════════════════════════════════
    // APP
    // ══════════════════════════════════════════════
    function App() {
      const [page, setPage] = useState("Home");
      const pages = {
        "Home":         <HomePage setPage={setPage} />,
        "About":        <AboutPage />,
        "Products":     <ProductsPage />,
        "Media":        <MediaPage />,
        "Future Plans": <FuturePlansPage />,
        "Contact":      <ContactPage />,
      };
      return (
        <>
          <Navbar page={page} setPage={setPage} />
          <main>{pages[page]}</main>
          <Footer setPage={setPage} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
